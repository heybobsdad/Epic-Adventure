<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>2026 Epic Adventure &mdash; Postcard from On the Road</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:#f0ece4;color:#222;min-height:100vh;}

/* ── POSTCARD HEADER ── */
.pc-header{
  background:linear-gradient(160deg,#1a3a5c 0%,#0f2540 60%,#1a3a5c 100%);
  padding:32px 20px 28px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.pc-header::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 80px);
}
.pc-eyebrow{
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:#c8873a;margin-bottom:10px;position:relative;
}
.pc-greeting{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,7vw,42px);
  font-style:italic;
  color:white;
  line-height:1.15;
  position:relative;
  margin-bottom:6px;
}
.pc-location{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,9vw,56px);
  font-weight:700;
  color:#c8873a;
  line-height:1.1;
  position:relative;
  margin-bottom:14px;
  letter-spacing:-0.5px;
}
.pc-badge{
  display:inline-block;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(200,135,58,.4);
  border-radius:20px;
  padding:5px 16px;
  font-size:12px;
  color:#a8bcd4;
  position:relative;
}
.pc-sig{
  margin-top:16px;
  font-size:11px;
  color:rgba(168,188,212,.6);
  letter-spacing:1px;
  position:relative;
}

/* ── CONTENT CARD ── */
.pc-card{
  max-width:640px;
  margin:0 auto;
  padding:0 16px 40px;
}

/* ── WRITE-UP ── */
.pc-writeup{
  background:white;
  border-radius:12px;
  padding:24px 22px;
  margin:20px 0;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  font-size:16px;
  line-height:1.8;
  color:#333;
}
.pc-writeup p{margin-bottom:12px;}
.pc-writeup p:last-child{margin-bottom:0;}
.pc-section-label{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:#c8873a;margin-bottom:10px;font-weight:600;
}

/* ── PHOTO GRID ── */
.nl-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  margin:20px 0;
}
@media(min-width:480px){.nl-grid{grid-template-columns:repeat(3,1fr);gap:8px;}}
@media(min-width:640px){.nl-grid{grid-template-columns:repeat(4,1fr);gap:10px;}}
.nl-thumb{
  aspect-ratio:1;overflow:hidden;border-radius:10px;
  cursor:pointer;background:#dde3eb;
}
.nl-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s;display:block;}
.nl-thumb:hover img{transform:scale(1.04);}
.nl-empty{
  text-align:center;padding:40px 20px;color:#999;
  font-size:14px;background:white;border-radius:12px;margin:20px 0;
}
.nl-photo-count{font-size:11px;color:#999;margin-bottom:8px;letter-spacing:1px;}

/* ── LIGHTBOX ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;
  align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:95vw;max-height:88vh;object-fit:contain;border-radius:4px;}
.lb-close{position:absolute;top:14px;right:18px;color:white;font-size:30px;
  cursor:pointer;background:none;border:none;line-height:1;opacity:.8;}
.lb-close:hover{opacity:1;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:white;font-size:44px;
  cursor:pointer;background:none;border:none;padding:0 16px;opacity:.6;}
.lb-nav:hover{opacity:1;}
.lb-prev{left:0;} .lb-next{right:0;}

/* ── FOOTER ── */
.pc-footer{
  text-align:center;padding:24px 16px;
  border-top:1px solid #d8d0c4;
  font-size:12px;color:#999;
  max-width:640px;margin:0 auto;
}
.pc-footer a{color:#c8873a;text-decoration:none;}
.pc-footer a:hover{text-decoration:underline;}
.pc-footer .follow{
  display:inline-block;margin-top:10px;
  background:#1a3a5c;color:white;
  padding:10px 24px;border-radius:24px;
  font-size:13px;font-weight:600;text-decoration:none;
  letter-spacing:.5px;
}
.pc-footer .follow:hover{background:#c8873a;color:white;}
</style>
</head>
<body>

<!-- POSTCARD HEADER -->
<div class="pc-header">
  <div class="pc-eyebrow">&#9650;&#9650;&#9650; &nbsp; 2026 Epic Adventure &nbsp; &#9650;&#9650;&#9650;</div>
  <div class="pc-greeting">Hello from</div>
  <div class="pc-location">On the Road</div>
  
  <div class="pc-sig">Dave &amp; Jeani &nbsp;&middot;&nbsp; Max the Dog &nbsp;&middot;&nbsp; On the Road</div>
</div>

<!-- CONTENT -->
<div class="pc-card">

  <!-- WRITE-UP -->
  <div class="pc-writeup">
    <div class="pc-section-label">From the Road</div>
    <p style="color:#999;font-style:italic;">Write-up coming soon.</p>
  </div>

  <!-- PHOTOS -->
  
  <div class="nl-empty">&#128247; Photos coming soon</div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">&#10005;</button>
  <button class="lb-nav lb-prev" onclick="nlLightboxNav(-1)">&#8249;</button>
  <img id="lb-img" src="" alt=""/>
  <button class="lb-nav lb-next" onclick="nlLightboxNav(1)">&#8250;</button>
</div>

<!-- FOOTER -->
<div class="pc-footer">
  <div>Follow our full journey &mdash; every stop, every day:</div>
  <a class="follow" href="https://heybobsdad.github.io/Epic-Adventure/index.html">&#127758; Open the Trip Journal</a>
</div>

<script>
const _nlp = [];
let _nlc = 0;
function nlLightbox(src) {
  _nlc = _nlp.indexOf(src.split('/').pop());
  if(_nlc < 0) _nlc = 0;
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function nlLightboxNav(d) {
  _nlc = (_nlc + d + _nlp.length) % _nlp.length;
  document.getElementById('lb-img').src = 'photos/newsletter/' + _nlp[_nlc];
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeLightbox();
  if(e.key==='ArrowRight') nlLightboxNav(1);
  if(e.key==='ArrowLeft') nlLightboxNav(-1);
});
</script>
</body>
</html>
